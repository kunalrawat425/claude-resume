name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install docx
        run: npm install -g docx

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax-check JS
        run: node -c scripts/build_ats_resume.js

      - name: Syntax-check Python
        run: python3 -m py_compile scripts/score_resume.py

      - name: Validate plugin manifest
        run: python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

      - name: Verify SKILL.md frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            head -1 "$f" | grep -q "^---$" || (echo "Missing frontmatter in $f"; exit 1)
          done
          echo "All SKILL.md files have frontmatter."
